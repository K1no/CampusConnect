<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园广场 - CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">C</div>
    CampusConnect
  </a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="news.html">校园资讯</a>
    <a href="trade.html">二手交易</a>
    <a href="lost.html">失物招领</a>
    <a href="forum.html" class="active">校园广场</a>
  </div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>

<main class="page-main">
  <div class="container">

    <div class="page-header">
      <h1 class="page-title">💬 校园广场</h1>
      <button class="btn btn-primary" onclick="requireLogin(() => openModal('forumPublishModal'))">
        + 发布帖子
      </button>
    </div>

    <!-- 快速发帖框（已登录时显示，main.js 控制） -->
    <div class="quick-post" id="quickPost" style="display:none">
      <textarea
        class="form-control"
        id="quickContent"
        placeholder="分享你的校园生活、学习心得…"
        rows="3"
      ></textarea>
      <div class="quick-post-footer">
        <input type="text" class="form-control" id="quickTitle" placeholder="标题（选填）" style="flex:1">
        <button class="btn btn-primary" onclick="quickPost()">发布</button>
      </div>
    </div>

    <!-- 帖子列表，由 forum.js 动态填充 -->
    <div class="forum-list" id="forumList">
      <div class="loading-tip">正在加载帖子...</div>
    </div>

  </div>
</main>

<footer class="footer">© 2026 CampusConnect 校园综合服务平台 · Web综合设计实践项目</footer>

<!-- 发布帖子弹窗 -->
<div class="modal-overlay" id="forumPublishModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">发布校园帖子</span>
      <button class="modal-close" onclick="closeModal('forumPublishModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">帖子标题 <span class="required">*</span></label>
        <input type="text" class="form-control" id="forumTitle" placeholder="请输入帖子标题">
        <div class="form-error" id="forumTitleErr">标题不能为空</div>
      </div>
      <div class="form-group">
        <label class="form-label">帖子内容 <span class="required">*</span></label>
        <textarea class="form-control" id="forumContent" rows="6" placeholder="请输入帖子详细内容"></textarea>
        <div class="form-error" id="forumContentErr">内容不能少于10个字</div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitForum()">发布</button>
    </div>
  </div>
</div>

<!-- 帖子详情弹窗（含回复） -->
<div class="modal-overlay" id="forumDetailModal">
  <div class="modal-box" style="max-width:620px">
    <div class="modal-header">
      <span class="modal-title" id="forumDetailTitle"></span>
      <button class="modal-close" onclick="closeModal('forumDetailModal')">×</button>
    </div>
    <div class="modal-body">
      <div id="forumDetailBody"></div>
      <div class="reply-section">
        <h4 class="reply-title">💬 回复列表</h4>
        <div id="replyList"></div>
        <div class="reply-input">
          <textarea class="form-control" id="replyContent" rows="2" placeholder="写下你的回复…"></textarea>
          <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="submitReply()">回复</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/forum.js"></script>
</body>
</html>
