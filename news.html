<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园资讯 - CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">C</div>
    CampusConnect
  </a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="news.html" class="active">校园资讯</a>
    <a href="trade.html">二手交易</a>
    <a href="lost.html">失物招领</a>
    <a href="forum.html">校园广场</a>
  </div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>

<main class="page-main">
  <div class="container">

    <div class="page-header">
      <h1 class="page-title">📰 校园资讯</h1>
      <!-- requireLogin：未登录时跳转登录页，已登录才打开弹窗 -->
      <button class="btn btn-primary" onclick="requireLogin(() => openModal('newsPublishModal'))">
        + 发布资讯
      </button>
    </div>

    <!-- 筛选栏：类型下拉 + 搜索框 -->
    <div class="filter-bar">
      <div class="tabs" id="newsTabs">
        <button class="tab-btn active" data-type="all">全部</button>
        <button class="tab-btn" data-type="notice">校园通知</button>
        <button class="tab-btn" data-type="activity">校园活动</button>
        <button class="tab-btn" data-type="lecture">学术讲座</button>
      </div>
      <div class="search-bar">
        <input type="text" id="news-search" placeholder="搜索资讯标题…">
        <button onclick="renderNews()">🔍</button>
      </div>
    </div>

    <!-- 资讯列表，由 news.js 动态填充 -->
    <div class="news-grid" id="newsList">
      <div class="loading-tip">正在加载资讯...</div>
    </div>

  </div>
</main>

<footer class="footer">© 2026 CampusConnect 校园综合服务平台 · Web综合设计实践项目</footer>

<!-- 发布资讯弹窗 -->
<div class="modal-overlay" id="newsPublishModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">发布校园资讯</span>
      <button class="modal-close" onclick="closeModal('newsPublishModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">资讯标题 <span class="required">*</span></label>
        <input type="text" class="form-control" id="newsTitle" placeholder="请输入资讯标题">
        <div class="form-error" id="newsTitleErr">标题不能为空</div>
      </div>
      <div class="form-group">
        <label class="form-label">资讯类型 <span class="required">*</span></label>
        <select class="form-control" id="newsType">
          <option value="">请选择类型</option>
          <option value="notice">校园通知</option>
          <option value="activity">校园活动</option>
          <option value="lecture">学术讲座</option>
        </select>
        <div class="form-error" id="newsTypeErr">请选择类型</div>
      </div>
      <div class="form-group">
        <label class="form-label">资讯内容 <span class="required">*</span></label>
        <textarea class="form-control" id="newsContent" rows="5" placeholder="请输入资讯详细内容"></textarea>
        <div class="form-error" id="newsContentErr">内容不能少于10个字</div>
      </div>
      <div class="form-group">
        <label class="form-label">封面图片链接（选填）</label>
        <input type="text" class="form-control" id="newsImage" placeholder="粘贴图片 URL 地址">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitNews()">发布</button>
    </div>
  </div>
</div>

<!-- 资讯详情弹窗 -->
<div class="modal-overlay" id="newsDetailModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle"></span>
      <button class="modal-close" onclick="closeModal('newsDetailModal')">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/news.js"></script>
</body>
</html>
