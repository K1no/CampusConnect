<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二手交易 - CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">C</div>
    CampusConnect
  </a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="news.html">校园资讯</a>
    <a href="trade.html" class="active">二手交易</a>
    <a href="lost.html">失物招领</a>
    <a href="forum.html">校园广场</a>
  </div>
  <div class="nav-right" id="nav-user-area"></div>
</nav>

<main class="page-main">
  <div class="container">

    <div class="page-header">
      <h1 class="page-title">♻️ 二手交易</h1>
      <button class="btn btn-primary" onclick="requireLogin(() => openModal('tradePublishModal'))">
        + 发布商品
      </button>
    </div>

    <!-- 筛选栏：品类 Tab + 价格区间 + 搜索框 -->
    <div class="filter-bar">
      <div class="tabs" id="tradeTabs">
        <button class="tab-btn active" data-cat="all">全部</button>
        <button class="tab-btn" data-cat="book">📚 书籍</button>
        <button class="tab-btn" data-cat="electronics">💻 电子</button>
        <button class="tab-btn" data-cat="daily">🛋️ 生活</button>
        <button class="tab-btn" data-cat="other">📦 其他</button>
      </div>
      <div class="price-filter">
        <input type="number" class="form-control" id="minPrice" placeholder="最低价" min="0">
        <span>—</span>
        <input type="number" class="form-control" id="maxPrice" placeholder="最高价" min="0">
        <button class="btn btn-ghost btn-sm" onclick="renderTrade()">筛选</button>
      </div>
      <div class="search-bar">
        <input type="text" id="trade-search" placeholder="搜索商品名称…">
        <button onclick="renderTrade()">🔍</button>
      </div>
    </div>

    <!-- 商品列表，由 trade.js 动态填充 -->
    <div class="trade-grid" id="tradeList">
      <div class="loading-tip">正在加载商品...</div>
    </div>

  </div>
</main>

<footer class="footer">© 2026 CampusConnect 校园综合服务平台 · Web综合设计实践项目</footer>

<!-- 发布商品弹窗 -->
<div class="modal-overlay" id="tradePublishModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">发布二手商品</span>
      <button class="modal-close" onclick="closeModal('tradePublishModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">商品名称 <span class="required">*</span></label>
        <input type="text" class="form-control" id="tradeTitle" placeholder="如：高等数学第七版（上册）">
        <div class="form-error" id="tradeTitleErr">请填写商品名称</div>
      </div>
      <div class="form-group">
        <label class="form-label">商品品类 <span class="required">*</span></label>
        <select class="form-control" id="tradeCat">
          <option value="">请选择品类</option>
          <option value="book">📚 书籍教材</option>
          <option value="electronics">💻 电子产品</option>
          <option value="daily">🛋️ 生活用品</option>
          <option value="other">📦 其他</option>
        </select>
        <div class="form-error" id="tradeCatErr">请选择品类</div>
      </div>
      <div class="form-group">
        <label class="form-label">价格（元）<span class="required">*</span></label>
        <input type="number" class="form-control" id="tradePrice" placeholder="0.00" min="0" step="0.01">
        <div class="form-error" id="tradePriceErr">请填写合理价格</div>
      </div>
      <div class="form-group">
        <label class="form-label">商品描述 <span class="required">*</span></label>
        <textarea class="form-control" id="tradeDesc" rows="4" placeholder="成色、使用情况、出售原因等"></textarea>
        <div class="form-error" id="tradeDescErr">描述不能为空</div>
      </div>
      <div class="form-group">
        <label class="form-label">联系方式 <span class="required">*</span></label>
        <input type="text" class="form-control" id="tradeContact" placeholder="微信 / 手机号 / QQ">
        <div class="form-error" id="tradeContactErr">请留下联系方式</div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitTrade()">发布</button>
    </div>
  </div>
</div>

<!-- 商品详情弹窗 -->
<div class="modal-overlay" id="tradeDetailModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="tradeDetailTitle"></span>
      <button class="modal-close" onclick="closeModal('tradeDetailModal')">×</button>
    </div>
    <div class="modal-body" id="tradeDetailBody"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/trade.js"></script>
</body>
</html>
